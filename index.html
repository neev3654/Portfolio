<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Critical font for LCP hero headline — loads before external stylesheet -->
    <style>
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 100;
        font-display: swap;
        src: url(https://fonts.gstatic.com/s/inter/v18/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyeAZ9hjg.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>

    <!-- Non-blocking Google Fonts (rest of weights) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" /></noscript>

    <!-- Primary SEO -->
    <title>Neev Patel | Full Stack Developer & UI/UX Designer</title>
    <meta name="description" content="Neev Patel — Full Stack Developer crafting cinematic digital experiences. Specializing in React, Node.js, and modern web technologies. View my projects, certifications, and hackathon wins." />
    <meta name="keywords" content="Neev Patel, Full Stack Developer, Frontend Developer, React Developer, Portfolio, UI/UX Designer, Web Developer" />
    <meta name="author" content="Neev Patel" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://neev-patel-portfolio.vercel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://neev-patel-portfolio.vercel.app/" />
    <meta property="og:title" content="Neev Patel | Full Stack Developer & UI/UX Designer" />
    <meta property="og:description" content="Full Stack Developer crafting cinematic digital experiences. Explore my projects, certifications, hackathon wins, and design work." />
    <meta property="og:image" content="https://neev-patel-portfolio.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Neev Patel Portfolio" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://neev-patel-portfolio.vercel.app/" />
    <meta name="twitter:title" content="Neev Patel | Full Stack Developer & UI/UX Designer" />
    <meta name="twitter:description" content="Full Stack Developer crafting cinematic digital experiences. Explore my projects, certifications, hackathon wins, and design work." />
    <meta name="twitter:image" content="https://neev-patel-portfolio.vercel.app/og-image.png" />

    <!-- Theme Color for mobile browsers -->
    <meta name="theme-color" content="#f5f5f7" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
